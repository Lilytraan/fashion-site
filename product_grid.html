<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Grid</title>
</head>

<body>
    <div class="pt-5 bg-white">
        <nav class="flex justify-between items-center">
            <div>
                <a href="#" class="m-5 text-black font-bold text-xl">Fashion</a>
            </div>
            <div class="hidden md:block">
                <a href="#" class="m-5 text-black font-medium">Home</a>
                <a href="#" class="m-5 text-black font-medium">Shop</a>
                <a href="#" class="m-5 text-black font-medium">About</a>
                <a href="#" class="m-5 text-black font-medium">Contact</a>
            </div>
        </nav>
        <div class="p-8 bg-gray-100 min-h-screen">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">
                    <img class="w-full h-48 object-cover"
                        src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&q=80&w=400"
                        alt="Product">

                    <div class="p-4">
                        <h3 class="text-lg font-semibold text-gray-800">Basic T-Shirt</h3>
                        <p class="text-blue-600 font-bold mt-1">$59</p>

                        <div class="mt-4 flex gap-2">
                            <button
                                class="flex-1 bg-black text-white py-2 rounded-lg font-medium hover:bg-gray-800 transition">
                                Buy now
                            </button>
                            <button class="p-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition"
                                title="Thêm vào giỏ hàng">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-600">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">
                    <img class="w-full h-48 object-cover"
                        src="https://www.cscsw.com/wp-content/uploads/2022/03/shutterstock_1540979699-scaled-1.jpeg"
                        alt="Product">

                    <div class="p-4">
                        <h3 class="text-lg font-semibold text-gray-800">Basic T-Shirt</h3>
                        <p class="text-blue-600 font-bold mt-1">$59</p>

                        <div class="mt-4 flex gap-2">
                            <button
                                class="flex-1 bg-black text-white py-2 rounded-lg font-medium hover:bg-gray-800 transition">
                                Buy now
                            </button>
                            <button class="p-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition"
                                title="Thêm vào giỏ hàng">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-600">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
